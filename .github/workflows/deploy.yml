name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        # npm ci の代わりに npm install を使用
        # (package-lock.json のバージョンをそのまま使う)
        run: npm install

      - name: Build + SSG (postbuild自動実行)
        working-directory: frontend
        run: npm run build

      - name: Verify SSG output
        working-directory: frontend
        run: |
          echo "=== 生成ファイル確認 ==="
          ls dist/column/ | head -10
          echo "記事HTML数: $(ls dist/column/ | wc -l)"
          echo "sitemap.xml: $(test -f dist/sitemap.xml && echo OK || echo MISSING)"
          echo "robots.txt:  $(test -f dist/robots.txt  && echo OK || echo MISSING)"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
          clean: true
