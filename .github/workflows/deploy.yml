name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject unresolved merge markers
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' \
            frontend/index.html \
            frontend/src \
            frontend/scripts \
            backend \
            --exclude-dir=node_modules \
            --exclude-dir=dist; then
            echo "Unresolved Git merge markers were found. Deployment stopped."
            exit 1
          fi
          echo "No unresolved merge markers found."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (includes postbuild SSG)
        working-directory: frontend
        run: npm run build

      - name: Verify generated root HTML
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          if grep -nE '^(<<<<<<<|=======|>>>>>>>)' dist/index.html; then
            echo "Merge markers remain in dist/index.html. Deployment stopped."
            exit 1
          fi
          grep -q '<title>StockWaveJP' dist/index.html
          grep -q 'name="description"' dist/index.html
          grep -q 'application/ld+json' dist/index.html
          echo "Root HTML SEO verification passed."

      - name: Verify SSG output
        working-directory: frontend
        run: |
          echo "=== 生成されたファイル ==="
          if [ -d dist/column ]; then
            ls dist/column/ | head -10
            echo "Total column HTMLs: $(ls dist/column/ | wc -l)"
          else
            echo "dist/column/ not found (columnData.js not available in this run)"
          fi
          echo "sitemap.xml: $(test -f dist/sitemap.xml && echo 'OK' || echo 'MISSING')"
          echo "robots.txt: $(test -f dist/robots.txt && echo 'OK' || echo 'MISSING')"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
          clean: true
