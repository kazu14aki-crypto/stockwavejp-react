name: Fetch EDINET Holdings Data

on:
  schedule:
    # 毎日 JST 20:30 に実行（UTC 11:30）
    - cron: '30 11 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  fetch-edinet:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch EDINET data
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python backend/fetch_edinet.py

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet frontend/public/data/edinet_holdings.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/edinet_holdings.json
          git commit -m "chore: update EDINET holdings data $(date +'%Y/%m/%d' -d '+9 hours')"
          git push
