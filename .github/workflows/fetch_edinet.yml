name: Fetch EDINET Holdings Data

on:
  schedule:
    # 毎日 JST 20:30 に実行（UTC 11:30）
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  fetch-edinet:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch EDINET data
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python backend/fetch_edinet.py

      - name: Show result
        run: |
          python3 -c "
          import json
          with open('frontend/public/data/edinet_holdings.json') as f:
              d = json.load(f)
          print(f'updated_at: {d[\"updated_at\"]}')
          print(f'count: {d[\"count\"]}')
          print(f'fetched_dates: {d[\"fetched_dates\"]}')
          "

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet frontend/public/data/edinet_holdings.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "変更なし"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "更新あり"
          fi

      # git pushとビルドを同一ステップで実行してタイミングずれを防ぐ
      - name: Setup Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend with latest data
        if: steps.check.outputs.changed == 'true'
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Commit data and deploy to gh-pages
        if: steps.check.outputs.changed == 'true'
        run: |
          # まずmainブランチにデータをコミット
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/edinet_holdings.json
          git commit -m "chore: update EDINET holdings data $(date +'%Y/%m/%d' -d '+9 hours')"
          git push

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
          clean: true
