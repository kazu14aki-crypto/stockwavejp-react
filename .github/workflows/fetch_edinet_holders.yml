name: Fetch EDINET Holders (Annual Reports)

on:
  schedule:
    - cron: '0 21 * * 1'  # 毎週月曜 JST 06:00（UTC 21:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch EDINET holders
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          cd backend
          python fetch_edinet_holders.py --days 14
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/stockholders/ || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update stockholder data $(date +'%Y/%m/%d' -d '+9 hours') JST"
            git pull origin main --rebase
            git push
          fi
