name: Fetch Large Holdings (5% Rule)

on:
  schedule:
    - cron: '30 11 * * 2'  # 毎週火曜 JST 20:30
  workflow_dispatch:
    inputs:
      days:
        description: '過去N日分を処理（初回フルビルドは400を指定）'
        required: false
        default: '90'

jobs:
  fetch-large-holdings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install httpx requests
      - name: Fetch large holdings from EDINET
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          cd backend
          python fetch_large_holdings.py --days ${{ github.event.inputs.days || '90' }}
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/large_holdings
          git diff --cached --quiet || (git commit -m "chore: update large holdings data" && git push)
