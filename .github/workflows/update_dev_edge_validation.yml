name: Update Dev Edge Validation
on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * 1-5' # Weekdays 19:30 JST
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/update_dev_edge_validation.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/public/data/dev_edge_signal_history.json frontend/public/data/dev_edge_signal_validation.json
          git diff --cached --quiet || git commit -m "data: update Dev Edge signal validation"
          git push
