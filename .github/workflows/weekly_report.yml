name: Generate Weekly Report

on:
  schedule:
    # 毎週金曜日 16:00 JST = 07:00 UTC
    - cron: '0 7 * * 5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pytz

      - name: Check API key is set
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ ANTHROPIC_API_KEY is not set in GitHub Secrets!"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          else
            echo "✅ ANTHROPIC_API_KEY is set (length: ${#ANTHROPIC_API_KEY})"
          fi

      - name: Generate weekly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_weekly_report.py

      - name: Commit and push report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add frontend/public/data/weekly_report.json
          git add frontend/public/data/weekly_reports/ || true
          git diff --staged --quiet || git commit -m "auto: weekly report $(date +'%Y-%m-%d')"
          git push
